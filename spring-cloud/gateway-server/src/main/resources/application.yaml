server:
  port: 9999
spring:
  application:
    name: gateway-server
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888

  # catch data from resource server
  data:
    redis:
      host: localhost
      port: 6379
      password: qwer

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

          routes:
            - id: pipeline
              uri: lb://pipeline
              predicates:
                - Path=/pipeline-service/**
              filters:
                - RewritePath=/pipeline-service/(?<segment>.*),/$\{segment}
                - name: Retry
                  args:
                    retries: 5
                    statuses: BAD_GATEWAY
                    methods: GET
                    backoff:
                      firstBackoff: 10ms
                      maxBackoff: 50ms
                      factor: 2
                      basedOnPreviousValue: false
                      httpclient:
                        connect-timeout: 1000
                        response-timeout: 5s

                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
            #                - name: CircuitBreaker
#                  args:
#                    name: pipelineCircuitBreaker
#                    fallbackUri: forward:/fallback/pipeline-service/pipeline-account/all
#                    statusCodes:
#                      - 5000
#                      - 404

            - id: account
              uri: lb://account
              predicates:
                - Path=/account/**
              filters:
                - RewritePath=/account/(?<segment>.*),/$\{segment}
                - name: CircuitBreaker
                  args:
                   name: accountCircuitBreaker
          httpclient:
            connect-timeout: 1000
            response-timeout: 5s





  # OAuth2 Client Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090
      client:
        provider:
          itp-standard:
            issuer-uri: http://localhost:9090
        registration:
          itp-standard:
            provider: itp-standard
            client-id: itp-standard
            client-secret: qwerqwer
            redirect-uri: http://localhost:9999/login/oauth2/code/itp-standard
            authorization-grant-type:
              - authorization_code
              - client-credentials
              - refresh_token
            scope:
              - openid # Auto issue access token
              - profile # Get profile
              - email # Get email
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 10000

management:
  endpoints:
    web:
      exposure:
        include: "*"


# this alternative if eureka cannot resolve service's hostname for discovery concept
#eureka:
#  instance:
#    instance-id: ${spring.application.name}
#    prefer-ip-address: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.cloud.gateway: DEBUG