axon:
  axonserver:
    enabled: false
  serializer:
    general: jackson
    events: jackson
    messages: jackson


server:
  port: 20261

spring:
  application:
    name: account

  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090

  datasource:
    url: jdbc:postgresql://localhost:16852/db_account
    username: itpusr
    password: itp@168
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true


# this alternative if eureka cannot resolve service's hostname for discovery concept
