spring:
  application:
    name: pipeline

  cloud:
    function:
      definition: processProduct;processMessage;processProductDetail
    stream:
      bindings:

        processProductDetail-in-0:  # is consuming data from product-detail if there is any event update or produce
          destination: product-detail   # topic-name
          group: monitor-group2   # consumer_group_id
          content-type: application/json
        processProduct-in-0:  # is consuming data from test-product topic
          destination: test-product   # topic_name
          group: monitor-group  # consumer_group_id
          content-type: application/json
        processMessage-in-0:
          destination: test-topic
      #        processMessage-out-0:
      #          destination: processed-messages-topic
        processProductDetail-out-0:
          destination: processed-product-detail
          content-type: application/json

      kafka:
        binder:
          brokers: localhost:29092,localhost:29094,localhost:29096
          configuration:
            auto.offset.reset: earliest

  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090
      client:
        provider:
          itp-standard:
            issuer-uri: http://localhost:9090
        registration:
          itp-standard:
            provider: itp-standard
            client-id: itp-standard
            client-secret: qwerqwer
            redirect-uri: http://localhost:9999/login/oauth2/code/itp-standard
            authorization-grant-type: client_credentials
            scope:
              - openid # Auto issue access token
              - email
              - profile

resilience4j:
  circuitbreaker:
    instances:
      account:
        sliding-window-size: 10
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 10000

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 20262

# this alternative if eureka cannot resolve service's hostname for discovery concept
eureka:
  instance:
    instance-id: ${spring.application.name}
    prefer-ip-address: true

logging:
  level:
    com.thong.pipeline: DEBUG
